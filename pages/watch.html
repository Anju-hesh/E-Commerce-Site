<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Watches </title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/watch.css">

</head>
<body>

    <nav class="navbar">
        <div class="container-nav">
            <a href="index.html" class="logo">Quick E</a>
            <ul class="nav-links">
                <li><a href="/pages/home.html">Home</a></li>
                <li><a href="/pages/watch.html" class="active">Watches</a></li>
                <li><a href="earbuds.html">Earbuds</a></li>
                <li><a href="smartphone.html">Smartphones</a></li>
                <li><a id="signin" href="/index.html">Sign In</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1><u style="color: rgb(20, 243, 0);">WATCH PRODUCT</u></h1>
            <div class="iconcart">
                <img src="/Assets/icons/icon.png" alt="Cart Icon" />
                <div class="totalQuantity">
                    0
                </div>
            </div>
        </header>

        <div class="listProduct">

            <div class="item">
                <img src="/Assets/images/watch/1.webp" alt="">
                <h2></h2>
                <div class="price">$550</div>
                <button>Add To Cart</button>
            </div>

        </div>

        <div class="cart">
        <h2>
            CART
        </h2>

        <div class="listCart">


            <div class="item">
                <img src="/Assets/images/watch/1.webp">
                <div class="content">
                    <div class="name"></div>
                    <div class="price">$550 / 1 product</div>
                </div>
                <div class="quantity">
                    <button>-</button>
                    <span class="value">3</span>
                    <button>+</button>
                </div>
            </div>


        </div>

        <div class="buttons">
            <div class="close">
                CLOSE
            </div>
            <div class="checkout">
                <a href="checkout.html">CHECKOUT</a>
            </div>
        </div>
    </div>

    </div>

    <script src="/js/app.js"></script>
</body>
</html>
